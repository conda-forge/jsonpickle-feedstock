schema_version: 1

context:
  name: jsonpickle
  version: "4.1.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 8afed18aa189fd81e2e833b426bb4af485594921f0b1d36c2001fc5637a2f210

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - setuptools_scm >=6.0
    - toml
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - jsonpickle
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python library for serializing any arbitrary object graph into JSON. It can take almost any Python object and turn the object into JSON. Additionally, it can reconstitute the object back into Python.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: http://jsonpickle.github.io/
  repository: https://github.com/jsonpickle/jsonpickle

extra:
  recipe-maintainers:
    - robmcmullen
    - ChrisBarker-NOAA
    - synapticarbors
